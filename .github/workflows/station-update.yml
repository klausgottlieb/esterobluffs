name: Update station data
# Low-maintenance: only git + python3 (no versioned marketplace actions to deprecate).
on:
  schedule:
    - cron: "*/15 * * * *"   # GitHub throttles high-frequency crons hard; */15 fires far more reliably than */5, and 15-min-old air temp/wind at a rental is invisible to a guest
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      WEATHERFLOW_TOKEN: ${{ secrets.WEATHERFLOW_TOKEN }}
      TEMPEST_STATION_ID: ${{ secrets.TEMPEST_STATION_ID }}
    steps:
      - name: Get the repo
        run: git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo
      - name: Fetch + commit if changed
        working-directory: repo
        run: |
          python3 fetch_station.py station-data.json
          git config user.name  "station-bot"
          git config user.email "station-bot@users.noreply.github.com"
          git add station-data.json
          if ! git diff --cached --quiet; then
            git commit -m "data: station $(date -u +%FT%TZ)"
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected, rebasing on moved remote (attempt $i)"
              git pull --rebase --autostash origin main
              sleep $((RANDOM % 4 + 1))
            done
          fi
