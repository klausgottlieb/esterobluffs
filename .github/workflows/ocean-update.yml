name: Update ocean data
# Low-maintenance: no versioned marketplace actions, only git + python3 (never deprecate).
on:
  schedule:
    - cron: "*/30 * * * *"   # buoy itself updates ~every 30 min, so faster fetches just re-pull the same numbers; */30 is throttled far less than */5 and fires closer to on time
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo
        run: git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo
      - name: Fetch + commit if changed
        working-directory: repo
        run: |
          python3 fetch_ocean.py ocean-data.json
          git config user.name  "ocean-bot"
          git config user.email "ocean-bot@users.noreply.github.com"
          git add ocean-data.json ocean-history.json
          if ! git diff --cached --quiet; then
            git commit -m "data: ocean $(date -u +%FT%TZ)"
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected, rebasing on moved remote (attempt $i)"
              git pull --rebase --autostash origin main
              sleep $((RANDOM % 4 + 1))
            done
          fi
