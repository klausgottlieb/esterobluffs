name: library-probe

# Manual verification run for the library fetcher. Run it from the Actions tab,
# then copy the whole log. It commits nothing and touches no site files: the
# fetcher runs in dry-run, so it only PRINTS its parsed events. Once the output
# looks right, the fetcher gets wired into events-update.yml and this workflow
# (plus library_probe.py) gets deleted.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run library fetcher (dry run)
        run: python fetch_library.py
